<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特別区 論文型 学習アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
header{background:#1a1a2e;color:#fff;padding:12px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
header h1{font-size:1.0rem;letter-spacing:.04em;opacity:.9}
.nav-tabs{display:flex;background:#16213e;border-bottom:2px solid #0f3460}
.nav-tab{flex:1;padding:12px 6px;text-align:center;cursor:pointer;font-size:.85rem;color:#aaa;transition:all .2s;border:none;background:none}
.nav-tab.active{color:#e94560;border-bottom:3px solid #e94560;font-weight:700}
.nav-tab:hover:not(.active){color:#fff}
.theme-bar{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;background:#fff;border-bottom:1px solid #e0e0e0;-webkit-overflow-scrolling:touch}
.theme-bar::-webkit-scrollbar{height:3px}
.theme-pill{padding:5px 12px;border-radius:20px;font-size:.75rem;border:2px solid currentColor;cursor:pointer;white-space:nowrap;transition:all .2s;background:#fff;font-weight:600}
.theme-pill.active{color:#fff!important}
.t0{color:#e74c3c}.t0.active{background:#e74c3c}
.t1{color:#3498db}.t1.active{background:#3498db}
.t2{color:#2ecc71}.t2.active{background:#2ecc71}
.t3{color:#f39c12}.t3.active{background:#f39c12}
.t4{color:#9b59b6}.t4.active{background:#9b59b6}
.t5{color:#1abc9c}.t5.active{background:#1abc9c}
.tall{color:#555}.tall.active{background:#555}
main{max-width:720px;margin:0 auto;padding:16px}
.mode-view{display:none}
.mode-view.active{display:block}
/* flashcard */
.card-wrapper{perspective:1000px;margin:20px auto;max-width:540px;height:270px}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.card-front{background:#fff}
.card-back{background:#fff;transform:rotateY(180deg)}
.card-theme-badge{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:12px;color:#fff;margin-bottom:12px}
.card-q{font-size:1.0rem;line-height:1.6;font-weight:600}
.card-a{font-size:1.05rem;line-height:1.6;color:#1a1a2e;font-weight:700}
.card-hint{font-size:.72rem;color:#bbb;margin-top:10px}
.card-controls{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.btn{padding:9px 22px;border-radius:10px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.btn-outline{background:#fff;border:2px solid #ddd;color:#555}.btn-outline:hover{border-color:#999}
.btn-wrong{background:#fee2e2;color:#e74c3c;border:2px solid #f8b4b4}.btn-wrong:hover{background:#e74c3c;color:#fff}
.btn-correct{background:#d1fae5;color:#059669;border:2px solid #a7f3d0}.btn-correct:hover{background:#059669;color:#fff}
.btn-primary{background:#1a1a2e;color:#fff}.btn-primary:hover{background:#0f3460}
.progress-bar-wrap{background:#e9ecef;border-radius:10px;height:8px;margin:10px 0;overflow:hidden}
.progress-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,#e94560,#f39c12);transition:width .3s}
.progress-text{font-size:.8rem;color:#888;text-align:center;margin-bottom:4px}
.stats-row{display:flex;gap:12px;justify-content:center;margin-top:8px}
.stat-chip{padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:600}
.stat-o{background:#d1fae5;color:#059669}
.stat-x{background:#fee2e2;color:#e74c3c}
.stat-left{background:#e0e7ff;color:#4338ca}
/* fill */
.template-area{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08);line-height:2.2;font-size:.92rem}
.blank-input{border:none;border-bottom:2px solid #3498db;background:transparent;font-size:.92rem;font-family:inherit;color:#1a1a2e;text-align:center;min-width:50px;padding:0 4px;outline:none;transition:border-color .2s}
.blank-input:focus{border-color:#e94560}
.blank-input.correct{border-color:#059669;background:#d1fae5;border-radius:4px}
.blank-input.wrong{border-color:#e74c3c;background:#fee2e2;border-radius:4px}
.blank-input.revealed{background:#fef9c3;border-color:#f59e0b;border-radius:4px;color:#92400e;font-weight:700}
.fill-controls{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap;align-items:center}
.btn-check{background:#0f3460;color:#fff}.btn-check:hover{background:#1a1a2e}
.btn-show{background:#f39c12;color:#fff}.btn-show:hover{background:#d68910}
.btn-reset-fill{background:#e9ecef;color:#555}
.score-badge{display:inline-block;padding:6px 18px;border-radius:20px;font-weight:700;font-size:.88rem}
.score-good{background:#d1fae5;color:#059669}
.score-mid{background:#fef9c3;color:#92400e}
.score-low{background:#fee2e2;color:#e74c3c}
/* essay */
.essay-header{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.essay-prompt strong{display:block;font-size:.95rem;color:#1a1a2e;margin-bottom:6px;font-weight:700}
.essay-prompt span{font-size:.88rem;line-height:1.75;color:#333}
.timer-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:12px}
.timer-display{font-size:1.8rem;font-weight:700;font-variant-numeric:tabular-nums;color:#1a1a2e;letter-spacing:.05em}
.timer-display.warning{color:#e74c3c;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.timer-btn{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:600}
.timer-start{background:#059669;color:#fff}.timer-start:hover{background:#047857}
.timer-pause{background:#f59e0b;color:#fff}.timer-pause:hover{background:#d97706}
.timer-reset{background:#e9ecef;color:#555}
.essay-textarea{width:100%;height:360px;border:2px solid #e0e7ff;border-radius:12px;padding:16px;font-size:.92rem;line-height:1.9;font-family:inherit;resize:vertical;outline:none;background:#fff;transition:border-color .2s}
.essay-textarea:focus{border-color:#4338ca}
.char-counter{text-align:right;font-size:.8rem;margin-top:4px}
.char-count{font-weight:700;font-size:.9rem}
.char-ok{color:#059669}.char-near{color:#f59e0b}.char-over{color:#e74c3c}
.checklist{background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-top:14px}
.checklist h3{font-size:.82rem;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid #f0f0f0}
.checklist-item:last-child{border:none}
.checklist-item input[type=checkbox]{width:17px;height:17px;margin-top:2px;cursor:pointer;accent-color:#e94560;flex-shrink:0}
.checklist-item label{font-size:.84rem;line-height:1.5;cursor:pointer}
.section-title{font-size:.88rem;font-weight:700;color:#888;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.04em}
.keyphrase-box{background:#f8f9ff;border-left:4px solid #4338ca;padding:10px 14px;border-radius:0 8px 8px 0;margin-top:12px;font-size:.82rem;line-height:1.7;color:#444}
.keyphrase-box strong{display:block;font-size:.78rem;color:#4338ca;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
@media(max-width:480px){.card-q{font-size:.9rem}.timer-display{font-size:1.4rem}.essay-textarea{height:280px}}
</style>
</head>
<body>
<header>
  <h1>📝 特別区Ⅰ類 論文型 学習アプリ ── 江戸川区版 2026</h1>
</header>
<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchMode('qa')">💡 一問一答</button>
  <button class="nav-tab" onclick="switchMode('fill')">📝 穴埋め</button>
  <button class="nav-tab" onclick="switchMode('essay')">⏱ 論述練習</button>
</div>

<!-- ========== 一問一答 ========== -->
<div id="view-qa" class="mode-view active">
  <div class="theme-bar">
    <button class="theme-pill tall active" onclick="filterQA(-1,this)">すべて</button>
    <button class="theme-pill t0" onclick="filterQA(0,this)">🔴 防災</button>
    <button class="theme-pill t1" onclick="filterQA(1,this)">🔵 DX</button>
    <button class="theme-pill t2" onclick="filterQA(2,this)">🟢 子ども</button>
    <button class="theme-pill t3" onclick="filterQA(3,this)">🟠 高齢</button>
    <button class="theme-pill t4" onclick="filterQA(4,this)">🟣 地域</button>
    <button class="theme-pill t5" onclick="filterQA(5,this)">🩵 多文化</button>
  </div>
  <main>
    <div class="progress-text" id="qa-progress-text">0 / 0</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="qa-progress-bar" style="width:0%"></div></div>
    <div class="stats-row">
      <span class="stat-chip stat-o" id="stat-o">○ 0</span>
      <span class="stat-chip stat-x" id="stat-x">× 0</span>
      <span class="stat-chip stat-left" id="stat-left">残 0</span>
    </div>
    <div class="card-wrapper">
      <div class="card" id="qa-card" onclick="flipCard()">
        <div class="card-face card-front">
          <span class="card-theme-badge" id="qa-badge">-</span>
          <div class="card-q" id="qa-question">テーマを選んでスタート</div>
          <div class="card-hint">タップで答えを確認</div>
        </div>
        <div class="card-face card-back">
          <span class="card-theme-badge" id="qa-badge2">-</span>
          <div class="card-a" id="qa-answer">-</div>
        </div>
      </div>
    </div>
    <div class="card-controls">
      <button class="btn btn-wrong" onclick="markCard(false)">× わからない</button>
      <button class="btn btn-correct" onclick="markCard(true)">○ わかった</button>
    </div>
    <div class="card-controls">
      <button class="btn btn-outline" onclick="prevCard()">◀ 前へ</button>
      <button class="btn btn-outline" onclick="shuffleCards()">🔀 シャッフル</button>
      <button class="btn btn-outline" onclick="nextCard()">次へ ▶</button>
    </div>
    <div class="card-controls">
      <button class="btn btn-outline" onclick="resetProgress()">進捗リセット</button>
      <button class="btn btn-primary" onclick="filterWrong()">× のみ表示</button>
    </div>
  </main>
</div>

<!-- ========== 穴埋め ========== -->
<div id="view-fill" class="mode-view">
  <div class="theme-bar">
    <button class="theme-pill t0 active" onclick="showFill(0,this)">🔴 防災</button>
    <button class="theme-pill t1" onclick="showFill(1,this)">🔵 DX</button>
    <button class="theme-pill t2" onclick="showFill(2,this)">🟢 子ども</button>
    <button class="theme-pill t3" onclick="showFill(3,this)">🟠 高齢</button>
    <button class="theme-pill t4" onclick="showFill(4,this)">🟣 地域</button>
    <button class="theme-pill t5" onclick="showFill(5,this)">🩵 多文化</button>
  </div>
  <main>
    <div class="section-title" id="fill-theme-title">防災・災害対策</div>
    <div class="fill-controls">
      <button class="btn btn-check" onclick="checkFill()">✅ 採点</button>
      <button class="btn btn-show" onclick="showAllAnswers()">👁 答えを見る</button>
      <button class="btn btn-reset-fill" onclick="resetFill()">🔄 リセット</button>
      <span id="fill-score"></span>
    </div>
    <div class="template-area" id="fill-content"></div>
  </main>
</div>

<!-- ========== 論述練習 ========== -->
<div id="view-essay" class="mode-view">
  <div class="theme-bar">
    <button class="theme-pill t0 active" onclick="showEssay(0,this)">🔴 防災</button>
    <button class="theme-pill t1" onclick="showEssay(1,this)">🔵 DX</button>
    <button class="theme-pill t2" onclick="showEssay(2,this)">🟢 子ども</button>
    <button class="theme-pill t3" onclick="showEssay(3,this)">🟠 高齢</button>
    <button class="theme-pill t4" onclick="showEssay(4,this)">🟣 地域</button>
    <button class="theme-pill t5" onclick="showEssay(5,this)">🩵 多文化</button>
  </div>
  <main>
    <div class="essay-header">
      <div class="essay-prompt">
        <strong id="essay-prompt-title">論述テーマ</strong>
        <span id="essay-prompt-body"></span>
      </div>
      <div id="essay-keyphrase" class="keyphrase-box" style="margin-top:10px"></div>
      <div class="timer-row">
        <div class="timer-display" id="timer-display">80:00</div>
        <button class="timer-btn timer-start" id="timer-btn" onclick="toggleTimer()">▶ スタート</button>
        <button class="timer-btn timer-reset" onclick="resetTimer()">↺ リセット</button>
      </div>
    </div>
    <div>
      <textarea class="essay-textarea" id="essay-textarea" placeholder="ここに論文を書いてください（1500字以内・80分）&#10;&#10;【構成の型】&#10;第1段落：現状認識（全国→特別区→江戸川区の固有事情）&#10;第2段落：課題分析（2点程度）&#10;第3段落：具体策①&#10;第4段落：具体策②&#10;第5段落：結論（上位理念と職員としての決意）" oninput="updateCharCount()"></textarea>
    </div>
    <div class="char-counter"><span class="char-count" id="char-count">0</span> / 1500字</div>
    <div class="checklist">
      <h3>📋 採点チェックリスト</h3>
      <div id="essay-checklist"></div>
    </div>
  </main>
</div>

<script>
// =====================================================
// DATA（江戸川区施策素材集 完全版）
// =====================================================
const themes = [

// ─────────────────────────────────────────────────────
// 0: 防災・災害対策
// ─────────────────────────────────────────────────────
{
  name:'防災・災害対策',color:'#e74c3c',
  prompt:'大規模水害・地震が想定される特別区において、区民の安全を確保するため、特別区の現状と課題を踏まえ、区職員として取り組む施策を具体的に論じなさい。',
  keyphrases:'「ここにいてはダメです」「犠牲者ゼロの実現」「ハード対策とソフト対策の両輪」「行政依存から住民主体の防災へ」「自助・共助・公助の連携」「要配慮者を包摂する防災体制」「2100年共生社会ビジョン」',
  template:
`江戸川区は明治以降の地下水くみ上げにより最大【4.5】mの地盤沈下が発生し、陸域の約【7割】がゼロメートル地帯となっている。大規模水害時には最大浸水深【10m以上】（マンション3〜4階相当）・浸水継続時間【2週間以上】が想定される。江東5区（江戸川・墨田・江東・足立・葛飾）の浸水想定区域内人口は約【249万人】に上る。一方、首都直下地震（M7.3）では死者約【6,100】人・帰宅困難者約【453】万人が想定され、一時滞在施設の約【22】万人分が不足している状況だ。

主な課題として、①公的な【広域避難場所】の確保不足、②【正常性バイアス】による避難行動の遅れ、③地震と洪水・高潮が重なる【複合災害】への対応、④令和3年法改正で努力義務化された要配慮者の【個別避難計画】の策定促進が挙げられる。

江戸川区は東京大学・片田敏孝特任教授の監修のもと「【ここにいてはダメです】」を表紙に掲げた水害ハザードマップを改訂（2025年第2版・英語・中国語・やさしい日本語版も配布）し、全世帯に配布した。江東5区大規模水害広域避難計画では【72時間】前・48時間前・24時間前・9時間前のタイムライン手順を定め「【犠牲者ゼロ】」を目標とした。民間宿泊施設への自主避難に1人最大【9,000】円を補助する広域避難補助金も整備している。ハード面では全体計画【28.6】kmのスーパー堤防整備が64%完成し、住宅耐震化率は【97】%と23区1位を誇る。さらに要配慮者支援として令和5年12月に「避難行動要支援者名簿の提供に関する条例」を制定し、平常時からの名簿情報共有を可能にした。`,
  checklist:[
    '地盤沈下4.5m・ゼロメートル地帯7割・浸水深10m以上などの数値を示した',
    '江東5区249万人・首都直下地震6,100人などの広域課題を示した',
    '正常性バイアス・複合災害・個別避難計画など複数の課題を挙げた',
    '「ここにいてはダメです」ハザードマップ（片田教授監修）に触れた',
    'タイムライン避難（72時間前等）・広域避難計画に触れた',
    '自主的広域避難補助金（9,000円）など具体的施策を示した',
    'スーパー堤防（28.6km・64%）または耐震化率97%・23区1位に触れた',
    '要配慮者の個別避難計画・名簿条例に触れた',
    '区職員として担う役割を具体的に述べた',
    '「2100年共生社会ビジョン」等の上位理念と結びつけた',
    '1500字以内に収めた',
  ],
  qa:[
    {q:'江戸川区の明治以降の最大地盤沈下量は？',a:'最大4.5m（地下水くみ上げによる）'},
    {q:'江戸川区の陸域でゼロメートル地帯が占める割合は？',a:'約7割'},
    {q:'江東5区（江戸川・墨田・江東・足立・葛飾）の浸水想定区域内人口は？',a:'約249万人'},
    {q:'大規模水害時の最大浸水深と継続時間は？',a:'10m以上（マンション3〜4階相当）・最長2週間以上'},
    {q:'首都直下地震（M7.3）の想定死者数・帰宅困難者数は？',a:'死者約6,100人・帰宅困難者約453万人'},
    {q:'首都直下地震での一時滞在施設の不足数は？',a:'約22万人分'},
    {q:'水害ハザードマップを監修した東大教授は？',a:'片田敏孝特任教授'},
    {q:'江戸川区水害ハザードマップの表紙のコピーは？',a:'「ここにいてはダメです」'},
    {q:'水害ハザードマップ第2版が公表された年は？',a:'2025年（令和7年）'},
    {q:'江東5区大規模水害広域避難計画のタイムライン（最初の行動開始）は何時間前か？',a:'72時間前（以降48時間前→24時間前→9時間前）'},
    {q:'自主的広域避難補助金の1人あたりの上限額は？',a:'最大9,000円'},
    {q:'スーパー堤防の全体計画距離と完成率（令和3年度末）は？',a:'28.6km・約64%（約18.3km完成）'},
    {q:'篠崎公園地区スーパー堤防の投資額と完成予定年度は？',a:'区と国で計約234億円・2026年度完成予定'},
    {q:'江戸川区の住宅耐震化率と23区内順位は？',a:'97%・23区1位'},
    {q:'江戸川区の密集市街地整備地区数の23区内順位は？',a:'23区最多'},
    {q:'防災アプリの多言語対応言語は？',a:'英語・中国語・韓国語'},
    {q:'令和3年法改正で努力義務化された要配慮者支援の取り組みは？',a:'個別避難計画の作成'},
  ]
},

// ─────────────────────────────────────────────────────
// 1: DX・行政デジタル化
// ─────────────────────────────────────────────────────
{

// =====================================================
// STATE
// =====================================================
let currentMode='qa',qaFilter=-1,qaPool=[],qaIndex=0,qaResults={},isFlipped=false;
let fillTheme=0,essayTheme=0,timerInterval=null,timerRunning=false,timerSeconds=80*60;

// =====================================================
// MODE SWITCH
// =====================================================
function switchMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+mode).classList.add('active');
  document.querySelectorAll('.nav-tab')[{qa:0,fill:1,essay:2}[mode]].classList.add('active');
  if(mode==='fill') renderFill();
  if(mode==='essay') renderEssay();
  if(mode==='qa') renderCard();
}

// =====================================================
// 一問一答
// =====================================================
function buildPool(f){
  let p=[];
  themes.forEach((t,ti)=>t.qa.forEach((q,qi)=>p.push({...q,themeIdx:ti,id:`${ti}-${qi}`})));
  return f>=0?p.filter(c=>c.themeIdx===f):p;
}
function filterQA(idx,el){
  document.querySelectorAll('#view-qa .theme-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  qaFilter=idx; qaPool=buildPool(idx); qaIndex=0; isFlipped=false; renderCard();
}
function renderCard(){
  if(!qaPool.length){document.getElementById('qa-question').textContent='カードがありません';updateProgress();return;}
  const c=qaPool[qaIndex],t=themes[c.themeIdx];
  document.getElementById('qa-question').textContent=c.q;
  document.getElementById('qa-answer').textContent=c.a;
  ['qa-badge','qa-badge2'].forEach(id=>{
    const el=document.getElementById(id);
    el.textContent=t.name; el.style.background=t.color;
  });
  document.getElementById('qa-card').classList.remove('flipped');
  isFlipped=false; updateProgress();
}
function flipCard(){isFlipped=!isFlipped;document.getElementById('qa-card').classList.toggle('flipped',isFlipped);}
function nextCard(){if(qaPool.length){qaIndex=(qaIndex+1)%qaPool.length;renderCard();}}
function prevCard(){if(qaPool.length){qaIndex=(qaIndex-1+qaPool.length)%qaPool.length;renderCard();}}
function markCard(ok){if(!qaPool.length)return;qaResults[qaPool[qaIndex].id]=ok;nextCard();}
function shuffleCards(){
  for(let i=qaPool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qaPool[i],qaPool[j]]=[qaPool[j],qaPool[i]];}
  qaIndex=0; renderCard();
}
function filterWrong(){
  const w=buildPool(qaFilter).filter(c=>qaResults[c.id]===false||qaResults[c.id]===undefined);
  if(!w.length){alert('すべて正解済みです！🎉');return;}
  qaPool=w; qaIndex=0; renderCard();
}
function resetProgress(){qaResults={};qaPool=buildPool(qaFilter);qaIndex=0;renderCard();}
function updateProgress(){
  const total=qaPool.length;
  const inPool=k=>qaPool.some(c=>c.id===k);
  const correct=Object.keys(qaResults).filter(k=>inPool(k)&&qaResults[k]===true).length;
  const wrong=Object.keys(qaResults).filter(k=>inPool(k)&&qaResults[k]===false).length;
  document.getElementById('qa-progress-text').textContent=`${qaIndex+1} / ${total}`;
  document.getElementById('qa-progress-bar').style.width=total?((qaIndex/(total-1||1))*100)+'%':'0%';
  document.getElementById('stat-o').textContent=`○ ${correct}`;
  document.getElementById('stat-x').textContent=`× ${wrong}`;
  document.getElementById('stat-left').textContent=`残 ${total-correct-wrong}`;
}

// =====================================================
// 穴埋め
// =====================================================
function showFill(idx,el){
  document.querySelectorAll('#view-fill .theme-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); fillTheme=idx;
  document.getElementById('fill-score').textContent=''; renderFill();
}
function renderFill(){
  const t=themes[fillTheme];
  document.getElementById('fill-theme-title').textContent=t.name;
  document.getElementById('fill-score').textContent='';
  let i=0;
  const html=t.template.replace(/【([^】]+)】/g,(m,a)=>{
    const idx=i++; const len=Math.max(4,a.length);
    return `<input class="blank-input" data-idx="${idx}" data-ans="${encodeURIComponent(a)}" size="${len}" maxlength="${a.length+10}" autocomplete="off" spellcheck="false">`;
  });
  document.getElementById('fill-content').innerHTML=html.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}
function norm(s){return s.replace(/[　 ]/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).toLowerCase();}
function checkFill(){
  const inputs=document.querySelectorAll('#fill-content .blank-input');
  let ok=0;
  inputs.forEach(inp=>{
    const a=decodeURIComponent(inp.dataset.ans);
    inp.classList.remove('correct','wrong','revealed');
    if(norm(inp.value.trim())===norm(a)){inp.classList.add('correct');ok++;}
    else inp.classList.add('wrong');
  });
  const total=inputs.length,pct=Math.round((ok/total)*100);
  const cls=pct>=80?'score-good':pct>=50?'score-mid':'score-low';
  document.getElementById('fill-score').innerHTML=`<span class="score-badge ${cls}">${ok}/${total} (${pct}%)</span>`;
}
function showAllAnswers(){
  document.querySelectorAll('#fill-content .blank-input').forEach(inp=>{
    inp.value=decodeURIComponent(inp.dataset.ans);
    inp.classList.remove('correct','wrong'); inp.classList.add('revealed');
  });
  document.getElementById('fill-score').innerHTML='<span class="score-badge score-mid">答えを表示中</span>';
}
function resetFill(){renderFill();}

// =====================================================
// 論述練習
// =====================================================
function showEssay(idx,el){
  document.querySelectorAll('#view-essay .theme-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); essayTheme=idx; resetTimer(); renderEssay();
}
function renderEssay(){
  const t=themes[essayTheme];
  document.getElementById('essay-prompt-title').textContent='【論述テーマ】'+t.name;
  document.getElementById('essay-prompt-body').textContent=t.prompt;
  document.getElementById('essay-keyphrase').innerHTML=`<strong>論文で使えるキーフレーズ</strong>${t.keyphrases}`;
  const cl=document.getElementById('essay-checklist');
  cl.innerHTML=t.checklist.map((item,i)=>`<div class="checklist-item"><input type="checkbox" id="chk-${i}"><label for="chk-${i}">${item}</label></div>`).join('');
  updateCharCount();
}
function updateCharCount(){
  const len=document.getElementById('essay-textarea').value.length;
  const el=document.getElementById('char-count');
  el.textContent=len;
  el.className='char-count '+(len>1500?'char-over':len>1300?'char-near':'char-ok');
}
function toggleTimer(){timerRunning?pauseTimer():startTimer();}
function startTimer(){
  timerRunning=true;
  document.getElementById('timer-btn').textContent='⏸ 一時停止';
  document.getElementById('timer-btn').className='timer-btn timer-pause';
  timerInterval=setInterval(()=>{
    if(timerSeconds<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('timer-display').textContent='00:00';return;}
    timerSeconds--; updateTimerDisplay();
  },1000);
}
function pauseTimer(){
  clearInterval(timerInterval); timerRunning=false;
  document.getElementById('timer-btn').textContent='▶ 再開';
  document.getElementById('timer-btn').className='timer-btn timer-start';
}
function resetTimer(){
  clearInterval(timerInterval); timerRunning=false; timerSeconds=80*60; updateTimerDisplay();
  document.getElementById('timer-btn').textContent='▶ スタート';
  document.getElementById('timer-btn').className='timer-btn timer-start';
}
function updateTimerDisplay(){
  const m=Math.floor(timerSeconds/60),s=timerSeconds%60;
  const el=document.getElementById('timer-display');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='timer-display'+(timerSeconds<300?' warning':'');
}

// =====================================================
// INIT
// =====================================================
qaPool=buildPool(-1); renderCard(); renderFill(); renderEssay();
</script>
